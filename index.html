<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Papieya Test Results</title>
    <link rel="stylesheet" href="./assets/styles.css">
  </head>
  <body>
    <main class="page">
      <section class="hero">
        <p class="eyebrow">Konnectable</p>
        <h1>Papieya Test Results</h1>
        <p class="lede">
          Sanitized test summaries published from private backend repositories.
        </p>
      </section>

      <section class="summary">
        <div class="summary-card">
          <span class="summary-label">Repositories</span>
          <strong id="repo-count">0</strong>
        </div>
        <div class="summary-card">
          <span class="summary-label">Passing</span>
          <strong id="passing-count">0</strong>
        </div>
        <div class="summary-card">
          <span class="summary-label">Failing</span>
          <strong id="failing-count">0</strong>
        </div>
        <div class="summary-card">
          <span class="summary-label">Awaiting Publish</span>
          <strong id="pending-count">0</strong>
        </div>
      </section>

      <section>
        <div id="repo-grid" class="repo-grid"></div>
      </section>
    </main>

    <script src="./assets/app.js" defer></script>
  </body>
</html>
